<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04_forms</title>
</head>
<body>
    <h1>Login here</h1>

    <form action="">
       <label for="email">
        email:
        <input type="email" name="email">
       </label>

       <label for="password">
        password:
        <input type="password" name="password">
       </label>

       <button type="submit">
        Login
       </button>

       <button type="reset">
        Reset
       </button>
    </form>
</body>
</html>
